# TEE simulation environment for group-chat.
#
# Each service runs one group-chat node inside Gramine's simulation mode
# (gramine-direct), which emulates the LibOS isolation of a real SGX enclave
# without requiring SGX hardware.
#
# Peer discovery uses iroh's default relay mode: nodes advertise themselves
# via the pkarr DHT and connect through iroh relay servers.  The containers
# only need outbound internet access — no special Docker networking required.
#
# Usage:
#   # Build and start all three TEE nodes (detached):
#   docker compose -f tests/tee/docker-compose.yml up --build -d
#
#   # Send a message as Alice:
#   docker attach tee-alice
#   Hello from Alice!          # <-- type here, Enter to send, Ctrl-P Ctrl-Q to detach
#
#   # Follow logs from all nodes:
#   docker compose -f tests/tee/docker-compose.yml logs -f
#
#   # Tear down:
#   docker compose -f tests/tee/docker-compose.yml down

name: mosaik-tee

x-tee-node: &tee-node
  build:
    context: ../..
    dockerfile: tests/tee/Dockerfile
  restart: unless-stopped
  # Keep stdin open and allocate a pseudo-TTY so `docker attach` works.
  stdin_open: true
  tty: true

services:
  alice:
    <<: *tee-node
    container_name: tee-alice
    command: ["--nickname", "Alice", "--color", "32", "--room", "tee-lobby"]

  bob:
    <<: *tee-node
    container_name: tee-bob
    command: ["--nickname", "Bob", "--color", "33", "--room", "tee-lobby"]
    # Give Alice a moment to start Raft leadership before Bob joins.
    depends_on:
      alice:
        condition: service_started

  charlie:
    <<: *tee-node
    container_name: tee-charlie
    command: ["--nickname", "Charlie", "--color", "34", "--room", "tee-lobby"]
    depends_on:
      bob:
        condition: service_started
